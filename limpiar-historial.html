<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Limpiar historial sin tipo — Plazas</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #111; color: #eee; }
    input  { padding: 8px 12px; font-size: 14px; background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; margin: 4px; width: 240px; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin: 8px 4px; border: none; border-radius: 6px; }
    #btn-login   { background: #16a34a; color: #fff; }
    #btn-preview { background: #2563eb; color: #fff; display: none; }
    #btn-borrar  { background: #dc2626; color: #fff; display: none; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { margin-top: 16px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .warn{ color: #fbbf24; }
  </style>
</head>
<body>
  <h2>🧹 Limpiar historial sin campo <code>tipo</code> — Plazas</h2>
  <p>Colecciones: <strong>historial</strong>, <strong>historial_manana</strong>, <strong>historial_noche</strong></p>

  <div id="login-form">
    <input id="email" type="email" placeholder="Email" />
    <input id="pass"  type="password" placeholder="Contraseña" />
    <button id="btn-login" onclick="login()">Iniciar sesión</button>
  </div>
  <button id="btn-preview" onclick="preview()">1. Ver cuántos registros se borrarían</button>
  <button id="btn-borrar"  onclick="borrar()">2. BORRAR definitivamente</button>
  <div id="log"></div>

<script type="module">
  import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, writeBatch, doc }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword }
                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-kFIqSDY-kXq7xn6kLSUtnzaPSq7Apbc",
    authDomain: "plazas-5e478.firebaseapp.com",
    projectId: "plazas-5e478",
    storageBucket: "plazas-5e478.firebasestorage.app",
    messagingSenderId: "48069807441",
    appId: "1:48069807441:web:e1aa77aac78cb4ad659770"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  const COLS = ["historial", "historial_manana", "historial_noche"];

  const log = msg => { document.getElementById("log").innerHTML += msg + "\n"; };

  let candidatos = [];

  window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("pass").value;
    const btn   = document.getElementById("btn-login");
    btn.disabled = true;
    btn.textContent = "Conectando...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById("login-form").style.display = "none";
      document.getElementById("btn-preview").style.display = "inline-block";
      log('<span class="ok">✅ Sesión iniciada. Podés buscar los registros.</span>\n');
    } catch(e) {
      log(`<span class="err">❌ Error de login: ${e.message}</span>`);
      btn.disabled = false;
      btn.textContent = "Iniciar sesión";
    }
  };

  window.preview = async function() {
    document.getElementById("btn-preview").disabled = true;
    candidatos = [];
    log("Buscando registros sin campo <code>tipo</code>...\n");

    for (const col of COLS) {
      try {
        const snap = await getDocs(collection(db, col));
        const sinTipo = snap.docs.filter(d => d.data().tipo === undefined);
        log(`  <span class="${sinTipo.length > 0 ? 'warn' : 'ok'}">${col}: ${snap.docs.length} totales, ${sinTipo.length} sin tipo</span>`);
        sinTipo.forEach(d => candidatos.push({ col, id: d.id, data: d.data() }));
      } catch(e) {
        log(`  <span class="err">${col}: error — ${e.message}</span>`);
      }
    }

    log(`\n<strong>Total a borrar: ${candidatos.length} registros</strong>`);

    if (candidatos.length > 0) {
      log('\nMuestra de los primeros 5:');
      candidatos.slice(0, 5).forEach(c => {
        const d = c.data;
        log(`  [${c.col}] ${d.mozoNombre || d.mozoId || '?'} — ${d.sector || ''} — ts:${d.ts ? new Date(d.ts).toLocaleDateString('es-AR') : '?'}`);
      });
      document.getElementById("btn-borrar").style.display = "inline-block";
    } else {
      log('<span class="ok">No hay registros sin tipo. Nada que borrar.</span>');
      document.getElementById("btn-preview").disabled = false;
    }
  };

  window.borrar = async function() {
    if (!candidatos.length) return;
    const btn = document.getElementById("btn-borrar");
    btn.disabled = true;
    btn.textContent = "Borrando...";
    log("\nIniciando borrado...");

    let borrados = 0;
    const CHUNK = 400;
    for (let i = 0; i < candidatos.length; i += CHUNK) {
      const batch = writeBatch(db);
      candidatos.slice(i, i + CHUNK).forEach(c => batch.delete(doc(db, c.col, c.id)));
      await batch.commit();
      borrados += Math.min(CHUNK, candidatos.length - i);
      log(`  Borrados ${borrados} / ${candidatos.length}...`);
    }

    log(`\n<span class="ok">✅ Listo. ${borrados} registros eliminados.</span>`);
    btn.textContent = "✅ Hecho";
  };
</script>
</body>
</html>
